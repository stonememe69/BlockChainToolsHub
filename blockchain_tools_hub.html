
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChainHub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0b0f;
    --bg2: #11131a;
    --bg3: #171922;
    --bg4: #1e2130;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f2ff;
    --text2: #8892aa;
    --text3: #4a5268;
    --accent: #4f7fff;
    --accent2: #7c3aed;
    --green: #22d3a0;
    --amber: #f59e0b;
    --red: #ef4444;
    --pink: #ec4899;
    --cyan: #06b6d4;
  }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,127,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,127,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* GLOW ORB */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(124,58,237,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* HEADER */
  header {
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(10,11,15,0.9);
    backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 1.15rem;
    letter-spacing: -0.02em;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .logo span { color: var(--accent); }

  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn {
    padding: 7px 16px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text);
  }
  .btn:hover { background: var(--bg4); border-color: var(--accent); color: var(--accent); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #3d6ee8; border-color: #3d6ee8; color: #fff; }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 320px;
    margin: 0 1rem;
  }

  .search-wrap input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px 7px 34px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
    pointer-events: none;
  }

  /* MAIN */
  .main { display: flex; min-height: calc(100vh - 64px); }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    padding: 1.5rem 0;
    border-right: 1px solid var(--border);
    background: var(--bg);
  }

  .sidebar-section {
    padding: 0 0.75rem 1.5rem;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 0 0.75rem;
    margin-bottom: 6px;
  }

  .cat-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-family: inherit;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.12s;
    text-align: left;
  }

  .cat-btn:hover { background: var(--bg3); color: var(--text); }
  .cat-btn.active { background: rgba(79,127,255,0.12); color: var(--accent); font-weight: 500; }

  .cat-icon {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .cat-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text3);
    background: var(--bg4);
    padding: 1px 6px;
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* CONTENT */
  .content { flex: 1; padding: 2rem; overflow-y: auto; }

  .content-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.75rem;
  }

  .page-title {
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    width: 32px; height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.12s;
  }
  .view-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .view-btn:hover:not(.active) { border-color: var(--border2); color: var(--text); }

  /* TOOLS GRID */
  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }

  .tools-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* TOOL CARD */
  .tool-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.25rem;
    transition: all 0.18s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    display: block;
  }

  .tool-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(79,127,255,0.04));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .tool-card:hover {
    border-color: rgba(79,127,255,0.3);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .tool-card:hover::before { opacity: 1; }

  .tool-card-list {
    flex-direction: row;
    align-items: center;
    padding: 0.85rem 1rem;
    border-radius: 8px;
  }

  .tool-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }

  .tool-favicon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--bg4);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    overflow: hidden;
  }

  .tool-favicon img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }

  .tool-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
  .tool-card:hover .tool-actions { opacity: 1; }

  .action-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.12s;
  }
  .action-btn:hover { background: var(--bg4); color: var(--text); }
  .action-btn.delete:hover { background: rgba(239,68,68,0.15); color: var(--red); border-color: rgba(239,68,68,0.3); }

  .tool-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tool-desc {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .tool-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }

  .tool-tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--bg4);
    color: var(--text3);
    border: 1px solid var(--border);
  }

  .tool-link {
    margin-left: auto;
    font-size: 11px;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
  }

  /* LIST VIEW */
  .list-card-info { flex: 1; display: flex; align-items: center; gap: 12px; }
  .list-card-favicon { width: 32px; height: 32px; border-radius: 8px; background: var(--bg4); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; overflow: hidden; }
  .list-card-favicon img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
  .list-card-text { flex: 1; min-width: 0; }
  .list-tool-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .list-tool-desc { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-card-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }

  /* MODAL OVERLAY */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 2rem;
    width: 480px;
    max-width: 95vw;
    transform: translateY(16px) scale(0.97);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-close {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: all 0.12s;
  }
  .modal-close:hover { background: var(--bg4); color: var(--text); }

  .form-group { margin-bottom: 1.1rem; }
  .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.03em; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-input::placeholder, .form-textarea::placeholder { color: var(--text3); }
  .form-select { appearance: none; cursor: pointer; }
  .form-textarea { resize: vertical; min-height: 80px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.5rem; }

  /* EMPTY STATE */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
    text-align: center;
    color: var(--text2);
  }
  .empty-icon { font-size: 48px; margin-bottom: 1rem; opacity: 0.5; }
  .empty-title { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; }
  .empty-desc { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.75rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-value {
    font-size: 1.4rem;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    background: linear-gradient(135deg, var(--accent), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-label { font-size: 11px; color: var(--text3); letter-spacing: 0.04em; text-transform: uppercase; }

  /* CAT MANAGEMENT */
  .manage-cat-btn {
    width: 100%;
    padding: 6px 12px;
    border-radius: 7px;
    border: 1px dashed var(--border2);
    background: transparent;
    color: var(--text3);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    margin-top: 6px;
    transition: all 0.12s;
  }
  .manage-cat-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,127,255,0.05); }

  /* TAG COLORS */
  .tag-defi { background: rgba(34,211,160,0.1); color: var(--green); border-color: rgba(34,211,160,0.2); }
  .tag-nft { background: rgba(236,72,153,0.1); color: var(--pink); border-color: rgba(236,72,153,0.2); }
  .tag-explorer { background: rgba(79,127,255,0.1); color: var(--accent); border-color: rgba(79,127,255,0.2); }
  .tag-wallet { background: rgba(245,158,11,0.1); color: var(--amber); border-color: rgba(245,158,11,0.2); }
  .tag-analytics { background: rgba(6,182,212,0.1); color: var(--cyan); border-color: rgba(6,182,212,0.2); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(34,211,160,0.3); }
  .toast.error { border-color: rgba(239,68,68,0.3); }

  /* CATEGORY MANAGE MODAL */
  .cat-item-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .cat-item-row:last-child { border: none; }
  .cat-color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  /* PREVIEW TOOLTIP */
  .preview-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  .pin-star { color: var(--amber); font-size: 12px; }

  /* QUICK PREVIEW */
  .preview-bar {
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 2px;
    margin-top: 10px;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }
  .tool-card:hover .preview-bar { transform: scaleX(1); }

  .no-results { text-align: center; padding: 3rem; color: var(--text2); }

  /* Responsive */
  @media (max-width: 700px) {
    .sidebar { display: none; }
    .content { padding: 1rem; }
    header { padding: 0 1rem; }
  }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">⛓</div>
      Chain<span>Hub</span>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search tools..." oninput="filterTools()">
    </div>
    <div class="header-actions">
      <button class="btn" onclick="openCatModal()">+ Category</button>
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Tool</button>
    </div>
  </header>

  <div class="main">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Views</div>
        <button class="cat-btn active" id="cat-all" onclick="selectCat('all')">
          <div class="cat-icon" style="background:rgba(79,127,255,0.1)">🌐</div>
          All Tools
          <span class="cat-count" id="count-all">0</span>
        </button>
        <button class="cat-btn" id="cat-pinned" onclick="selectCat('pinned')">
          <div class="cat-icon" style="background:rgba(245,158,11,0.1)">⭐</div>
          Pinned
          <span class="cat-count" id="count-pinned">0</span>
        </button>
      </div>
      <div class="sidebar-section" id="cats-sidebar">
        <div class="sidebar-label">Categories</div>
      </div>
      <div style="padding: 0 0.75rem;">
        <button class="manage-cat-btn" onclick="openManageCatsModal()">⚙ Manage Categories</button>
      </div>
    </aside>

    <!-- CONTENT -->
    <main class="content">
      <div class="stats-bar" id="stats-bar"></div>

      <div class="content-header">
        <div class="page-title" id="page-title">All Tools</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="view-toggle">
            <button class="view-btn active" id="view-grid" onclick="setView('grid')" title="Grid view">⊞</button>
            <button class="view-btn" id="view-list" onclick="setView('list')" title="List view">☰</button>
          </div>
        </div>
      </div>

      <div id="tools-container"></div>
    </main>
  </div>

  <!-- ADD/EDIT TOOL MODAL -->
  <div class="modal-overlay" id="tool-modal">
    <div class="modal">
      <div class="modal-title">
        <span id="modal-title-text">Add Tool</span>
        <button class="modal-close" onclick="closeToolModal()">×</button>
      </div>
      <div class="form-group">
        <label class="form-label">Tool URL *</label>
        <input class="form-input" id="tool-url" placeholder="https://etherscan.io" oninput="autoFillFromUrl()">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Name *</label>
          <input class="form-input" id="tool-name" placeholder="Etherscan">
        </div>
        <div class="form-group">
          <label class="form-label">Category *</label>
          <select class="form-select" id="tool-cat"></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="tool-desc" placeholder="What does this tool do?"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Custom Icon (emoji)</label>
          <input class="form-input" id="tool-icon" placeholder="🔍" maxlength="2">
        </div>
        <div class="form-group">
          <label class="form-label">Tags (comma separated)</label>
          <input class="form-input" id="tool-tags" placeholder="free, evm, mainnet">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeToolModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveTool()">Save Tool</button>
      </div>
    </div>
  </div>

  <!-- ADD CATEGORY MODAL -->
  <div class="modal-overlay" id="cat-modal">
    <div class="modal">
      <div class="modal-title">
        <span>New Category</span>
        <button class="modal-close" onclick="closeCatModal()">×</button>
      </div>
      <div class="form-group">
        <label class="form-label">Category Name *</label>
        <input class="form-input" id="cat-name" placeholder="DeFi Protocols">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Icon (emoji)</label>
          <input class="form-input" id="cat-icon" placeholder="💎" maxlength="2">
        </div>
        <div class="form-group">
          <label class="form-label">Color</label>
          <select class="form-select" id="cat-color">
            <option value="#22d3a0">🟢 Green</option>
            <option value="#4f7fff">🔵 Blue</option>
            <option value="#ec4899">🩷 Pink</option>
            <option value="#f59e0b">🟡 Amber</option>
            <option value="#06b6d4">🩵 Cyan</option>
            <option value="#7c3aed">🟣 Purple</option>
            <option value="#ef4444">🔴 Red</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeCatModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveCat()">Create Category</button>
      </div>
    </div>
  </div>

  <!-- MANAGE CATS MODAL -->
  <div class="modal-overlay" id="manage-cats-modal">
    <div class="modal">
      <div class="modal-title">
        <span>Manage Categories</span>
        <button class="modal-close" onclick="closeManageCatsModal()">×</button>
      </div>
      <div id="cats-list" style="max-height:320px;overflow-y:auto;"></div>
      <div class="modal-footer">
        <button class="btn" onclick="closeManageCatsModal()">Done</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>
</div>

<script>
const STORAGE_KEY = 'chainhub_v2';

const DEFAULT_CATS = [
  { id: 'explorers', name: 'Block Explorers', icon: '🔍', color: '#4f7fff' },
  { id: 'defi', name: 'DeFi', icon: '💎', color: '#22d3a0' },
  { id: 'wallets', name: 'Wallets', icon: '👛', color: '#f59e0b' },
  { id: 'nft', name: 'NFTs', icon: '🖼', color: '#ec4899' },
  { id: 'analytics', name: 'Analytics', icon: '📊', color: '#06b6d4' },
  { id: 'bridges', name: 'Bridges', icon: '🌉', color: '#7c3aed' },
  { id: 'dev', name: 'Dev Tools', icon: '⚙', color: '#ef4444' },
  { id: 'data', name: 'Data / APIs', icon: '🗄', color: '#22d3a0' },
];

const DEFAULT_TOOLS = [
  { id: 't1', name: 'Etherscan', url: 'https://etherscan.io', cat: 'explorers', desc: 'Ethereum blockchain explorer. View transactions, wallets, tokens and smart contracts.', icon: '🔍', tags: ['ethereum', 'evm', 'free'], pinned: true, faviconUrl: 'https://etherscan.io/images/favicon3.ico' },
  { id: 't2', name: 'Uniswap', url: 'https://app.uniswap.org', cat: 'defi', desc: 'Leading decentralized exchange for swapping ERC-20 tokens with automated market making.', icon: '🦄', tags: ['dex', 'amm', 'ethereum'], pinned: false, faviconUrl: '' },
  { id: 't3', name: 'MetaMask', url: 'https://metamask.io', cat: 'wallets', desc: 'Most popular Ethereum browser wallet for DApps, DeFi, and NFT interaction.', icon: '🦊', tags: ['browser', 'ethereum', 'web3'], pinned: true, faviconUrl: '' },
  { id: 't4', name: 'OpenSea', url: 'https://opensea.io', cat: 'nft', desc: 'Largest NFT marketplace. Buy, sell and discover rare digital items.', icon: '🌊', tags: ['marketplace', 'ethereum', 'polygon'], pinned: false, faviconUrl: '' },
  { id: 't5', name: 'Dune Analytics', url: 'https://dune.com', cat: 'analytics', desc: 'Community platform for on-chain data analytics using SQL queries and dashboards.', icon: '📊', tags: ['sql', 'free', 'on-chain'], pinned: false, faviconUrl: '' },
  { id: 't6', name: 'Hardhat', url: 'https://hardhat.org', cat: 'dev', desc: 'Ethereum development environment for compiling, testing and deploying smart contracts.', icon: '🔨', tags: ['solidity', 'testing', 'npm'], pinned: false, faviconUrl: '' },
  { id: 't7', name: 'Stargate', url: 'https://stargate.finance', cat: 'bridges', desc: 'Cross-chain bridge for moving assets across multiple blockchain networks seamlessly.', icon: '🌉', tags: ['cross-chain', 'bridge', 'layerzero'], pinned: false, faviconUrl: '' },
  { id: 't8', name: 'The Graph', url: 'https://thegraph.com', cat: 'data', desc: 'Indexing protocol for querying blockchain data with GraphQL API endpoints.', icon: '🗄', tags: ['graphql', 'api', 'indexing'], pinned: true, faviconUrl: '' },
];

let state = { tools: [], cats: [], view: 'grid', activeCat: 'all', search: '', editingToolId: null };

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      state.tools = s.tools || DEFAULT_TOOLS;
      state.cats = s.cats || DEFAULT_CATS;
      state.view = s.view || 'grid';
    } else {
      state.tools = [...DEFAULT_TOOLS];
      state.cats = [...DEFAULT_CATS];
    }
  } catch(e) {
    state.tools = [...DEFAULT_TOOLS];
    state.cats = [...DEFAULT_CATS];
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ tools: state.tools, cats: state.cats, view: state.view }));
  } catch(e) {}
}

function genId() { return 't' + Date.now().toString(36); }
function genCatId() { return 'c' + Date.now().toString(36); }

// RENDER SIDEBAR
function renderSidebar() {
  const container = document.getElementById('cats-sidebar');
  const allCount = state.tools.length;
  const pinnedCount = state.tools.filter(t => t.pinned).length;
  document.getElementById('count-all').textContent = allCount;
  document.getElementById('count-pinned').textContent = pinnedCount;

  let html = '<div class="sidebar-label">Categories</div>';
  state.cats.forEach(cat => {
    const count = state.tools.filter(t => t.cat === cat.id).length;
    const isActive = state.activeCat === cat.id;
    html += `<button class="cat-btn ${isActive ? 'active' : ''}" onclick="selectCat('${cat.id}')">
      <div class="cat-icon" style="background:${cat.color}22; font-size:15px">${cat.icon}</div>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${cat.name}</span>
      <span class="cat-count">${count}</span>
    </button>`;
  });

  container.innerHTML = html;

  // update "all" and "pinned" active state
  document.getElementById('cat-all').className = 'cat-btn ' + (state.activeCat === 'all' ? 'active' : '');
  document.getElementById('cat-pinned').className = 'cat-btn ' + (state.activeCat === 'pinned' ? 'active' : '');
}

// RENDER STATS
function renderStats() {
  const total = state.tools.length;
  const cats = new Set(state.tools.map(t => t.cat)).size;
  const pinned = state.tools.filter(t => t.pinned).length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-value">${total}</div><div class="stat-label">Total Tools</div></div>
    <div class="stat"><div class="stat-value">${cats}</div><div class="stat-label">Categories</div></div>
    <div class="stat"><div class="stat-value">${pinned}</div><div class="stat-label">Pinned</div></div>
    <div class="stat"><div class="stat-value">${state.cats.length}</div><div class="stat-label">All Categories</div></div>
  `;
}

// FILTER
function getFilteredTools() {
  let tools = [...state.tools];
  if (state.activeCat === 'pinned') tools = tools.filter(t => t.pinned);
  else if (state.activeCat !== 'all') tools = tools.filter(t => t.cat === state.activeCat);
  if (state.search) {
    const q = state.search.toLowerCase();
    tools = tools.filter(t =>
      t.name.toLowerCase().includes(q) ||
      (t.desc || '').toLowerCase().includes(q) ||
      (t.tags || []).some(tag => tag.toLowerCase().includes(q))
    );
  }
  return tools;
}

// RENDER TOOLS
function renderTools() {
  const tools = getFilteredTools();
  const container = document.getElementById('tools-container');
  const cat = state.cats.find(c => c.id === state.activeCat);
  const pageTitle = document.getElementById('page-title');

  if (state.activeCat === 'all') pageTitle.textContent = `All Tools`;
  else if (state.activeCat === 'pinned') pageTitle.textContent = `⭐ Pinned`;
  else if (cat) pageTitle.textContent = `${cat.icon} ${cat.name}`;

  if (!tools.length) {
    container.innerHTML = `<div class="empty">
      <div class="empty-icon">🔭</div>
      <div class="empty-title">${state.search ? 'No tools found' : 'No tools yet'}</div>
      <div class="empty-desc">${state.search ? 'Try a different search term.' : 'Add your first tool to get started.'}</div>
      ${!state.search ? '<button class="btn btn-primary" onclick="openAddModal()">+ Add Tool</button>' : ''}
    </div>`;
    return;
  }

  if (state.view === 'grid') {
    container.innerHTML = `<div class="tools-grid">${tools.map(t => renderCard(t)).join('')}</div>`;
  } else {
    container.innerHTML = `<div class="tools-list">${tools.map(t => renderListCard(t)).join('')}</div>`;
  }
}

function getCatForTool(catId) {
  return state.cats.find(c => c.id === catId);
}

function getFaviconUrl(tool) {
  if (tool.faviconUrl) return tool.faviconUrl;
  try {
    const host = new URL(tool.url).hostname;
    return `https://www.google.com/s2/favicons?domain=${host}&sz=64`;
  } catch(e) { return ''; }
}

function renderCard(tool) {
  const cat = getCatForTool(tool.cat);
  const fav = getFaviconUrl(tool);
  const tagHtml = (tool.tags || []).slice(0,2).map(t => `<span class="tool-tag">${t}</span>`).join('');
  return `<div class="tool-card" onclick="openTool('${tool.id}')">
    <div class="tool-top">
      <div class="tool-favicon">
        ${fav ? `<img src="${fav}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt="">
        <span style="display:none;font-size:18px">${tool.icon || (cat ? cat.icon : '🔧')}</span>` : `<span style="font-size:18px">${tool.icon || (cat ? cat.icon : '🔧')}</span>`}
      </div>
      <div class="tool-actions">
        ${tool.pinned ? '' : ''}
        <button class="action-btn" onclick="event.stopPropagation();togglePin('${tool.id}')" title="${tool.pinned ? 'Unpin' : 'Pin'}">
          ${tool.pinned ? '⭐' : '☆'}
        </button>
        <button class="action-btn" onclick="event.stopPropagation();editTool('${tool.id}')" title="Edit">✏</button>
        <button class="action-btn delete" onclick="event.stopPropagation();deleteTool('${tool.id}')" title="Delete">✕</button>
      </div>
    </div>
    <div class="tool-name">${tool.pinned ? '<span class="pin-star">⭐</span> ' : ''}${tool.name}</div>
    <div class="tool-desc">${tool.desc || 'No description added yet.'}</div>
    <div class="tool-meta">
      ${cat ? `<span class="tool-tag" style="background:${cat.color}18;color:${cat.color};border-color:${cat.color}33">${cat.icon} ${cat.name}</span>` : ''}
      ${tagHtml}
      <span class="tool-link">${getDomain(tool.url)}</span>
    </div>
    <div class="preview-bar"></div>
  </div>`;
}

function renderListCard(tool) {
  const cat = getCatForTool(tool.cat);
  const fav = getFaviconUrl(tool);
  return `<div class="tool-card tool-card-list" onclick="openTool('${tool.id}')">
    <div class="list-card-info">
      <div class="list-card-favicon">
        ${fav ? `<img src="${fav}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt=""><span style="display:none;font-size:15px">${tool.icon || '🔧'}</span>` : `<span style="font-size:15px">${tool.icon || '🔧'}</span>`}
      </div>
      <div class="list-card-text">
        <div class="list-tool-name">${tool.pinned ? '⭐ ' : ''}${tool.name}</div>
        <div class="list-tool-desc">${tool.desc || getDomain(tool.url)}</div>
      </div>
    </div>
    <div class="list-card-right">
      ${cat ? `<span class="tool-tag" style="background:${cat.color}18;color:${cat.color};border-color:${cat.color}33;font-size:11px">${cat.icon} ${cat.name}</span>` : ''}
      <span style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace">${getDomain(tool.url)}</span>
      <div class="tool-actions" style="opacity:1">
        <button class="action-btn" onclick="event.stopPropagation();togglePin('${tool.id}')" title="Pin">${tool.pinned ? '⭐' : '☆'}</button>
        <button class="action-btn" onclick="event.stopPropagation();editTool('${tool.id}')" title="Edit">✏</button>
        <button class="action-btn delete" onclick="event.stopPropagation();deleteTool('${tool.id}')" title="Delete">✕</button>
      </div>
    </div>
  </div>`;
}

function getDomain(url) {
  try { return new URL(url).hostname.replace('www.', ''); } catch(e) { return url; }
}

function openTool(id) {
  const tool = state.tools.find(t => t.id === id);
  if (tool && tool.url) {
    try { window.open(tool.url, '_blank'); } catch(e) {}
  }
}

// SELECT CAT
function selectCat(id) {
  state.activeCat = id;
  renderSidebar();
  renderTools();
}

// FILTER
function filterTools() {
  state.search = document.getElementById('search-input').value;
  renderTools();
}

// VIEW
function setView(v) {
  state.view = v;
  document.getElementById('view-grid').className = 'view-btn' + (v === 'grid' ? ' active' : '');
  document.getElementById('view-list').className = 'view-btn' + (v === 'list' ? ' active' : '');
  saveState();
  renderTools();
}

// PIN
function togglePin(id) {
  const t = state.tools.find(t => t.id === id);
  if (t) { t.pinned = !t.pinned; saveState(); renderSidebar(); renderStats(); renderTools(); }
}

// DELETE
function deleteTool(id) {
  state.tools = state.tools.filter(t => t.id !== id);
  saveState(); renderAll();
  showToast('Tool removed', 'success');
}

// TOOL MODAL
function openAddModal() {
  state.editingToolId = null;
  document.getElementById('modal-title-text').textContent = 'Add Tool';
  document.getElementById('tool-url').value = '';
  document.getElementById('tool-name').value = '';
  document.getElementById('tool-desc').value = '';
  document.getElementById('tool-icon').value = '';
  document.getElementById('tool-tags').value = '';
  populateCatSelect();
  document.getElementById('tool-modal').classList.add('open');
}

function editTool(id) {
  const t = state.tools.find(t => t.id === id);
  if (!t) return;
  state.editingToolId = id;
  document.getElementById('modal-title-text').textContent = 'Edit Tool';
  document.getElementById('tool-url').value = t.url;
  document.getElementById('tool-name').value = t.name;
  document.getElementById('tool-desc').value = t.desc || '';
  document.getElementById('tool-icon').value = t.icon || '';
  document.getElementById('tool-tags').value = (t.tags || []).join(', ');
  populateCatSelect(t.cat);
  document.getElementById('tool-modal').classList.add('open');
}

function closeToolModal() {
  document.getElementById('tool-modal').classList.remove('open');
}

function populateCatSelect(selected) {
  const sel = document.getElementById('tool-cat');
  sel.innerHTML = state.cats.map(c => `<option value="${c.id}" ${selected === c.id ? 'selected' : ''}>${c.icon} ${c.name}</option>`).join('');
  if (state.activeCat !== 'all' && state.activeCat !== 'pinned' && !selected) {
    sel.value = state.activeCat;
  }
}

function autoFillFromUrl() {
  const url = document.getElementById('tool-url').value.trim();
  if (!url || document.getElementById('tool-name').value) return;
  try {
    const host = new URL(url).hostname.replace('www.', '');
    const name = host.split('.')[0];
    document.getElementById('tool-name').value = name.charAt(0).toUpperCase() + name.slice(1);
  } catch(e) {}
}

function saveTool() {
  const url = document.getElementById('tool-url').value.trim();
  const name = document.getElementById('tool-name').value.trim();
  const cat = document.getElementById('tool-cat').value;
  const desc = document.getElementById('tool-desc').value.trim();
  const icon = document.getElementById('tool-icon').value.trim();
  const tags = document.getElementById('tool-tags').value.split(',').map(t => t.trim()).filter(Boolean);

  if (!url || !name) { showToast('URL and Name are required', 'error'); return; }

  if (state.editingToolId) {
    const t = state.tools.find(t => t.id === state.editingToolId);
    if (t) { Object.assign(t, { url, name, cat, desc, icon, tags, faviconUrl: '' }); }
    showToast('Tool updated ✓', 'success');
  } else {
    state.tools.push({ id: genId(), url, name, cat, desc, icon, tags, pinned: false, faviconUrl: '' });
    showToast('Tool added ✓', 'success');
  }

  saveState();
  closeToolModal();
  renderAll();
}

// CAT MODAL
function openCatModal() {
  document.getElementById('cat-name').value = '';
  document.getElementById('cat-icon').value = '';
  document.getElementById('cat-color').value = '#22d3a0';
  document.getElementById('cat-modal').classList.add('open');
}

function closeCatModal() { document.getElementById('cat-modal').classList.remove('open'); }

function saveCat() {
  const name = document.getElementById('cat-name').value.trim();
  const icon = document.getElementById('cat-icon').value.trim() || '📁';
  const color = document.getElementById('cat-color').value;
  if (!name) { showToast('Category name required', 'error'); return; }
  state.cats.push({ id: genCatId(), name, icon, color });
  saveState();
  closeCatModal();
  renderAll();
  showToast('Category created ✓', 'success');
}

// MANAGE CATS
function openManageCatsModal() {
  renderManageCats();
  document.getElementById('manage-cats-modal').classList.add('open');
}

function closeManageCatsModal() { document.getElementById('manage-cats-modal').classList.remove('open'); }

function renderManageCats() {
  const container = document.getElementById('cats-list');
  if (!state.cats.length) { container.innerHTML = '<p style="color:var(--text2);font-size:13px;padding:1rem 0">No categories yet.</p>'; return; }
  container.innerHTML = state.cats.map(cat => {
    const count = state.tools.filter(t => t.cat === cat.id).length;
    return `<div class="cat-item-row">
      <div class="cat-color-dot" style="background:${cat.color}"></div>
      <span style="font-size:16px">${cat.icon}</span>
      <span style="font-size:13px;flex:1">${cat.name}</span>
      <span style="font-size:12px;color:var(--text3);margin-right:12px">${count} tools</span>
      <button class="action-btn delete" onclick="deleteCat('${cat.id}')" title="Delete category">✕</button>
    </div>`;
  }).join('');
}

function deleteCat(id) {
  const count = state.tools.filter(t => t.cat === id).length;
  if (count > 0 && !confirm(`Delete category and ${count} tool(s)?`)) return;
  state.tools = state.tools.filter(t => t.cat !== id);
  state.cats = state.cats.filter(c => c.id !== id);
  if (state.activeCat === id) state.activeCat = 'all';
  saveState();
  renderManageCats();
  renderAll();
  showToast('Category deleted', 'success');
}

// TOAST
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// KEYBOARD
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeToolModal();
    closeCatModal();
    closeManageCatsModal();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
});

// CLOSE MODALS ON OVERLAY CLICK
['tool-modal','cat-modal','manage-cats-modal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target.id === id) {
      document.getElementById(id).classList.remove('open');
    }
  });
});

function renderAll() {
  renderSidebar();
  renderStats();
  renderTools();
}

// INIT
loadState();
renderAll();
</script>
</body>
</html>
