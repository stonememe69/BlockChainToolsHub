<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChainHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--bg2:#0f1018;--bg3:#141520;--bg4:#1a1c2e;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#eef0ff;--text2:#7a84a0;--text3:#3d4560;
  --accent:#5b7fff;--accent2:#7c3aed;
  --green:#20d9a0;--amber:#f5a623;--red:#f04444;--pink:#e84d9a;--cyan:#0acdd8;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(91,127,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(91,127,255,0.022) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:-300px;right:-200px;width:700px;height:700px;background:radial-gradient(circle,rgba(124,58,237,0.055) 0%,transparent 65%);pointer-events:none;z-index:0}
.app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1}

/* HEADER */
header{height:56px;display:flex;align-items:center;padding:0 1.25rem;gap:10px;border-bottom:1px solid var(--border);background:rgba(9,9,15,0.92);backdrop-filter:blur(24px);flex-shrink:0;z-index:50}
.logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:1rem;letter-spacing:-.025em;white-space:nowrap;text-decoration:none;color:inherit}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.logo em{color:var(--accent);font-style:normal}
.search-wrap{position:relative;flex:1;max-width:260px}
.search-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:6px 10px 6px 28px;color:var(--text);font-family:inherit;font-size:12.5px;outline:none;transition:border-color .15s}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap input:focus{border-color:var(--accent)}
.s-ico{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.hbtns{display:flex;gap:5px;margin-left:auto;align-items:center}
.btn{padding:5px 13px;border-radius:7px;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border2);background:var(--bg3);color:var(--text);white-space:nowrap;line-height:1.4}
.btn:hover{background:var(--bg4);border-color:var(--accent);color:var(--accent)}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-p:hover{background:#4a6ef0;border-color:#4a6ef0;color:#fff !important}
.btn-sm{padding:4px 10px;font-size:11px}
.body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:196px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:.75rem 0;background:var(--bg)}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.s-lbl{font-size:9.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:0 .9rem;margin-bottom:3px}
.s-sec{padding:0 0 .9rem}
.cat-btn{display:flex;align-items:center;gap:7px;width:calc(100% - 8px);margin:1px 4px;padding:6px 9px;border-radius:7px;border:none;background:transparent;color:var(--text2);font-family:inherit;font-size:12px;cursor:pointer;transition:all .12s;text-align:left}
.cat-btn:hover{background:var(--bg3);color:var(--text)}
.cat-btn.active{background:rgba(91,127,255,0.13);color:var(--accent);font-weight:500}
.c-ico{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.c-cnt{margin-left:auto;font-size:9.5px;color:var(--text3);background:var(--bg4);padding:1px 5px;border-radius:8px;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.add-cat-btn{width:calc(100% - 8px);margin:2px 4px;padding:5px 9px;border-radius:7px;border:1px dashed var(--border2);background:transparent;color:var(--text3);font-family:inherit;font-size:11px;cursor:pointer;transition:all .12s;display:block}
.add-cat-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(91,127,255,0.05)}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:1.1rem 1.25rem}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.stats{display:flex;gap:1.25rem;margin-bottom:.9rem;padding-bottom:.9rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:1px}
.sv{font-size:1.25rem;font-weight:700;font-family:'JetBrains Mono',monospace;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sl{font-size:9.5px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase}
.c-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.page-ttl{font-size:1rem;font-weight:600;letter-spacing:-.02em}
.vtog{display:flex;gap:3px}
.vbtn{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:all .12s}
.vbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.vbtn:hover:not(.active){color:var(--text)}

/* GRID */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:.75rem}
.tools-list{display:flex;flex-direction:column;gap:5px}

/* CARD */
.tool-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:.9rem 1rem;transition:border-color .18s,transform .18s,box-shadow .18s;cursor:pointer;position:relative;overflow:hidden;display:block;text-decoration:none}
.tool-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 55%,rgba(91,127,255,0.05));opacity:0;transition:opacity .2s;pointer-events:none}
.tool-card:hover{border-color:rgba(91,127,255,0.35);transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,0,0,0.28)}
.tool-card:hover::after{opacity:1}
.tool-card-list{flex-direction:row;align-items:center;padding:.65rem .85rem;border-radius:8px;transform:none !important}
.tool-card-list:hover{box-shadow:none;border-color:rgba(91,127,255,0.25)}
.t-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.t-fav{width:34px;height:34px;border-radius:8px;background:var(--bg4);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;overflow:hidden}
.t-fav img{width:34px;height:34px;object-fit:cover;border-radius:8px}
.t-acts{display:flex;gap:3px;opacity:0;transition:opacity .15s}
.tool-card:hover .t-acts,.tool-card-list:hover .t-acts{opacity:1}
.a-btn{width:24px;height:24px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;transition:all .12s;flex-shrink:0}
.a-btn:hover{background:var(--bg4);color:var(--text)}
.a-btn.del:hover{background:rgba(240,68,68,0.15);color:var(--red);border-color:rgba(240,68,68,0.3)}
.t-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-desc{font-size:11px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:1.5em}
.t-meta{display:flex;align-items:center;gap:5px;margin-top:7px;flex-wrap:nowrap;overflow:hidden}
.t-tag{font-size:9.5px;font-weight:500;padding:2px 6px;border-radius:20px;background:var(--bg4);color:var(--text3);border:1px solid var(--border);white-space:nowrap;flex-shrink:0}
.t-url{margin-left:auto;font-size:9.5px;color:var(--accent);font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:1;min-width:0}
.pbar{height:2px;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;margin-top:8px;transform:scaleX(0);transform-origin:left;transition:transform .3s}
.tool-card:hover .pbar{transform:scaleX(1)}

/* LIST CARD */
.lci{flex:1;display:flex;align-items:center;gap:9px;min-width:0}
.lfav{width:28px;height:28px;border-radius:7px;background:var(--bg4);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;overflow:hidden}
.lfav img{width:28px;height:28px;object-fit:cover;border-radius:7px}
.ltxt{flex:1;min-width:0}
.ln{font-size:12.5px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ld{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lr{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 1rem;text-align:center}
.ei{font-size:36px;margin-bottom:.6rem;opacity:.4}
.et{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:.35rem}
.ed{font-size:11.5px;color:var(--text2);margin-bottom:1.1rem}

/* OVERLAY / MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:1.4rem;width:460px;max-width:95vw;max-height:88vh;overflow-y:auto;transform:translateY(12px) scale(.97);transition:transform .2s}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.overlay.open .modal{transform:translateY(0) scale(1)}
.m-ttl{font-size:.95rem;font-weight:600;margin-bottom:1.1rem;display:flex;align-items:center;justify-content:space-between}
.m-cls{width:24px;height:24px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;line-height:1;transition:all .12s}
.m-cls:hover{background:var(--bg4);color:var(--text)}
.fg{margin-bottom:.8rem}
.fl{display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:4px;letter-spacing:.03em}
.fi,.fs,.fta{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;color:var(--text);font-family:inherit;font-size:12.5px;outline:none;transition:border-color .15s}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--accent)}
.fi::placeholder,.fta::placeholder{color:var(--text3)}
.fs{appearance:none;cursor:pointer}
.fs option{background:var(--bg3)}
.fta{resize:vertical;min-height:65px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.m-foot{display:flex;gap:6px;justify-content:flex-end;margin-top:1.1rem;padding-top:.9rem;border-top:1px solid var(--border)}

/* EMOJI PICKER */
.emoji-wrap{position:relative}
.erow{display:flex;gap:5px}
.erow .fi{flex:1}
.epick-btn{padding:7px 10px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
.epick-btn:hover{border-color:var(--accent);color:var(--accent)}
.epanel{position:absolute;top:calc(100% + 5px);left:0;right:0;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:9px;z-index:400;display:none;box-shadow:0 10px 28px rgba(0,0,0,0.5)}
.epanel.open{display:block}
.ep-tabs{display:flex;gap:3px;margin-bottom:7px;flex-wrap:wrap}
.ep-tab{padding:2px 9px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:10px;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap}
.ep-tab.active,.ep-tab:hover{background:rgba(91,127,255,0.15);border-color:var(--accent);color:var(--accent)}
.ep-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:2px}
.ep-em{width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:17px;border-radius:6px;cursor:pointer;transition:background .1s;border:none;background:transparent}
.ep-em:hover{background:var(--bg4)}

/* IMPORT/EXPORT */
.imp-area{width:100%;background:var(--bg3);border:2px dashed var(--border2);border-radius:8px;padding:.9rem;color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:10.5px;min-height:110px;outline:none;resize:vertical;transition:border-color .15s;line-height:1.5}
.imp-area:focus{border-color:var(--accent)}
.imp-area[readonly]{color:var(--text2);cursor:text}

/* MANAGE CATS */
.citem{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.citem:last-child{border:none}
.cdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* TOAST */
.toast{position:fixed;bottom:1.1rem;left:50%;transform:translateX(-50%) translateY(55px);background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:7px 16px;font-size:12px;color:var(--text);z-index:999;transition:transform .28s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(32,217,160,.35)}
.toast.err{border-color:rgba(240,68,68,.35)}

/* SCROLL ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.tool-card{animation:fadeUp .2s ease both}
</style>
</head>
<body>
<div class="app">
  <header>
    <a class="logo" href="#"><div class="logo-icon">вӣ“</div>Chain<em>Hub</em></a>
    <div class="search-wrap">
      <span class="s-ico">вҢ•</span>
      <input id="srch" type="text" placeholder="Search tools...  вҢҳK" oninput="filterTools()">
    </div>
    <div class="hbtns">
      <button class="btn btn-sm" onclick="openIE()">вҮ… Import/Export</button>
      <button class="btn btn-sm" onclick="openCatModal()">пјӢ Category</button>
      <button class="btn btn-p btn-sm" onclick="openAddModal()">пјӢ Add Tool</button>
    </div>
  </header>
  <div class="body">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content">
      <div class="stats" id="stats"></div>
      <div class="c-hdr">
        <div class="page-ttl" id="pg-ttl">All Tools</div>
        <div class="vtog">
          <button class="vbtn active" id="vg" onclick="setView('grid')" title="Grid view">вҠһ</button>
          <button class="vbtn" id="vl" onclick="setView('list')" title="List view">вҳ°</button>
        </div>
      </div>
      <div id="tc"></div>
    </main>
  </div>
</div>

<!-- TOOL MODAL -->
<div class="overlay" id="tool-modal">
<div class="modal">
  <div class="m-ttl"><span id="m-ttl-txt">Add Tool</span><button class="m-cls" onclick="closeModal('tool-modal')">Г—</button></div>
  <div class="fg"><label class="fl">URL *</label><input class="fi" id="f-url" placeholder="https://etherscan.io" oninput="autoFill()"></div>
  <div class="frow">
    <div class="fg"><label class="fl">Name *</label><input class="fi" id="f-name" placeholder="Etherscan"></div>
    <div class="fg"><label class="fl">Category *</label><select class="fs" id="f-cat"></select></div>
  </div>
  <div class="fg"><label class="fl">Description</label><textarea class="fta" id="f-desc" placeholder="What does this tool do?"></textarea></div>
  <div class="frow">
    <div class="fg">
      <label class="fl">Icon</label>
      <div class="emoji-wrap" id="tool-ew">
        <div class="erow"><input class="fi" id="f-icon" placeholder="рҹ”Қ" maxlength="4"><button class="epick-btn" onclick="toggleEP('tool')">Pick в–ҫ</button></div>
        <div class="epanel" id="tool-epanel"><div class="ep-tabs" id="tool-etabs"></div><div class="ep-grid" id="tool-egrid"></div></div>
      </div>
    </div>
    <div class="fg"><label class="fl">Tags (comma separated)</label><input class="fi" id="f-tags" placeholder="free, evm, mainnet"></div>
  </div>
  <div class="m-foot">
    <button class="btn" onclick="closeModal('tool-modal')">Cancel</button>
    <button class="btn btn-p" onclick="saveTool()">Save Tool</button>
  </div>
</div>
</div>

<!-- CAT MODAL -->
<div class="overlay" id="cat-modal">
<div class="modal" style="width:360px">
  <div class="m-ttl"><span id="cat-ttl">New Category</span><button class="m-cls" onclick="closeModal('cat-modal')">Г—</button></div>
  <div class="fg"><label class="fl">Name *</label><input class="fi" id="c-name" placeholder="DeFi Protocols"></div>
  <div class="frow">
    <div class="fg">
      <label class="fl">Icon</label>
      <div class="emoji-wrap" id="cat-ew">
        <div class="erow"><input class="fi" id="c-icon" placeholder="рҹ’Һ" maxlength="4"><button class="epick-btn" onclick="toggleEP('cat')">Pick в–ҫ</button></div>
        <div class="epanel" id="cat-epanel"><div class="ep-tabs" id="cat-etabs"></div><div class="ep-grid" id="cat-egrid"></div></div>
      </div>
    </div>
    <div class="fg">
      <label class="fl">Color</label>
      <select class="fs" id="c-color">
        <option value="#22d3a0">рҹҹў Green</option>
        <option value="#5b7fff">рҹ”ө Blue</option>
        <option value="#ec4899">рҹ©· Pink</option>
        <option value="#f59e0b">рҹҹЎ Amber</option>
        <option value="#06b6d4">рҹ©ө Cyan</option>
        <option value="#7c3aed">рҹҹЈ Purple</option>
        <option value="#ef4444">рҹ”ҙ Red</option>
        <option value="#f97316">рҹҹ  Orange</option>
      </select>
    </div>
  </div>
  <div class="m-foot">
    <button class="btn" onclick="closeModal('cat-modal')">Cancel</button>
    <button class="btn btn-p" onclick="saveCat()">Create</button>
  </div>
</div>
</div>

<!-- MANAGE CATS MODAL -->
<div class="overlay" id="mgcat-modal">
<div class="modal" style="width:400px">
  <div class="m-ttl"><span>Manage Categories</span><button class="m-cls" onclick="closeModal('mgcat-modal')">Г—</button></div>
  <div id="cats-list"></div>
  <div class="m-foot"><button class="btn" onclick="closeModal('mgcat-modal')">Done</button></div>
</div>
</div>

<!-- IMPORT/EXPORT MODAL -->
<div class="overlay" id="ie-modal">
<div class="modal" style="width:500px">
  <div class="m-ttl"><span>Import / Export</span><button class="m-cls" onclick="closeModal('ie-modal')">Г—</button></div>
  <div style="display:flex;gap:7px;margin-bottom:1rem">
    <button class="btn" style="flex:1" onclick="showExport()">рҹ“Ө Export JSON</button>
    <button class="btn" style="flex:1" onclick="showImport()">рҹ“Ҙ Import / Merge</button>
    <button class="btn" style="flex:1;color:var(--red);border-color:rgba(240,68,68,.3)" onclick="resetToDefault()">вҡ  Reset All</button>
  </div>
  <div id="ie-body"></div>
  <div class="m-foot"><button class="btn" onclick="closeModal('ie-modal')">Close</button></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const SK = 'chainhub_v3';

function gid(p='t'){return p+Date.now().toString(36)+Math.random().toString(36).slice(2,5)}

/* в”Җв”Җ STORAGE: localStorage with SEED fallback в”Җв”Җ */
function load(){
  // 1. Try current key
  try{
    const r=localStorage.getItem(SK);
    if(r){const d=JSON.parse(r);S.tools=d.tools||[];S.cats=d.cats||[];S.view=d.view||'grid';return;}
  }catch(e){}
  // 2. Try legacy keys - auto migrate
  for(const k of LEGACY){
    try{
      const r=localStorage.getItem(k);
      if(r){
        const d=JSON.parse(r);
        if((d.tools||[]).length||(d.cats||[]).length){
          S.tools=d.tools||[];S.cats=d.cats||[];S.view=d.view||'grid';
          save();
          showToast(`Migrated from ${k} вң“`,'ok');
          return;
        }
      }
    }catch(e){}
  }
  // 3. Use your baked-in seed data
  S.tools=JSON.parse(JSON.stringify(SEED_DATA.tools));
  S.cats=JSON.parse(JSON.stringify(SEED_DATA.cats));
  S.view=SEED_DATA.view||'grid';
  save();
}

function save(){
  try{localStorage.setItem(SK,JSON.stringify({tools:S.tools,cats:S.cats,view:S.view}));}catch(e){}
}

function getFiltered(){
  let t=[...S.tools];
  if(S.activeCat==='pinned')t=t.filter(x=>x.pinned);
  else if(S.activeCat!=='all')t=t.filter(x=>x.cat===S.activeCat);
  if(S.search){const q=S.search.toLowerCase();t=t.filter(x=>x.name.toLowerCase().includes(q)||(x.desc||'').toLowerCase().includes(q)||(x.tags||[]).some(tg=>tg.toLowerCase().includes(q)));}
  return t;
}

function renderTools(){
  const tools=getFiltered(),tc=document.getElementById('tc');
  const cat=S.cats.find(c=>c.id===S.activeCat);
  document.getElementById('pg-ttl').textContent=S.activeCat==='all'?'All Tools':S.activeCat==='pinned'?'вӯҗ Pinned':cat?`${cat.icon} ${cat.name}`:'';
  if(!tools.length){
    tc.innerHTML=`<div class="empty"><div class="ei">${S.search?'рҹ”ӯ':'рҹ“Ұ'}</div><div class="et">${S.search?'No results':'No tools yet'}</div><div class="ed">${S.search?'Try a different term.':'Add your first tool to get started.'}</div>${!S.search?'<button class="btn btn-p" onclick="openAddModal()">пјӢ Add Tool</button>':''}</div>`;
    return;
  }
  if(S.view==='grid'){tc.innerHTML=`<div class="tools-grid">${tools.map(renderCard).join('')}</div>`;}
  else{tc.innerHTML=`<div class="tools-list">${tools.map(renderListCard).join('')}</div>`;}
}

function gc(id){return S.cats.find(c=>c.id===id)}
function domain(url){try{return new URL(url).hostname.replace('www.','')}catch(e){return url}}
function fav(t){try{return`https://www.google.com/s2/favicons?domain=${new URL(t.url).hostname}&sz=64`}catch(e){return''}}

function favHtml(t,sz=34){
  const f=t.faviconUrl||fav(t);
  const ico=t.icon||(gc(t.cat)||{}).icon||'рҹ”§';
  const rs=sz===34?8:7;
  return f?`<img src="${f}" style="width:${sz}px;height:${sz}px;object-fit:cover;border-radius:${rs}px" onerror="this.style.display='none';this.nextSibling.style.display='flex'" loading="lazy"><span style="display:none;font-size:${sz===34?15:13}px">${ico}</span>`:`<span style="font-size:${sz===34?15:13}px">${ico}</span>`;
}

function renderCard(t,i){
  const cat=gc(t.cat);
  return`<div class="tool-card" style="animation-delay:${Math.min(i*0.03,0.3)}s" onclick="openTool('${t.id}')">
    <div class="t-top">
      <div class="t-fav">${favHtml(t,34)}</div>
      <div class="t-acts">
        <button class="a-btn" onclick="event.stopPropagation();pin('${t.id}')" title="${t.pinned?'Unpin':'Pin'}">${t.pinned?'вӯҗ':'вҳҶ'}</button>
        <button class="a-btn" onclick="event.stopPropagation();editT('${t.id}')" title="Edit">вңҸ</button>
        <button class="a-btn del" onclick="event.stopPropagation();delT('${t.id}')" title="Delete">вң•</button>
      </div>
    </div>
    <div class="t-name">${t.pinned?'<span style="font-size:10px">вӯҗ</span> ':''}${t.name}</div>
    <div class="t-desc">${t.desc||'<span style="opacity:.4">No description yet.</span>'}</div>

      ${cat?`<span class="t-tag" style="background:${cat.color}18;color:${cat.color};border-color:${cat.color}33">${cat.icon} ${cat.name}</span>`:''}
      ${(t.tags||[]).slice(0,1).map(tg=>`<span class="t-tag">${tg}</span>`).join('')}
      <span class="t-url">${domain(t.url)}</span>
    </div>
    <div class="pbar"></div>

}

function openTool(id){const t=S.tools.find(x=>x.id===id);if(t)try{window.open(t.url,'_blank')}catch(e){}}

function filterTools(){S.search=document.getElementById('srch').value;renderTools()}

function pin(id){const t=S.tools.find(x=>x.id===id);if(t){t.pinned=!t.pinned;save();renderAll()}}

function popCats(sel){document.getElementById('f-cat').innerHTML=S.cats.map(c=>`<option value="${c.id}"${sel===c.id?' selected':''}>${c.icon} ${c.name}</option>`).join('');if(S.activeCat!=='all'&&S.activeCat!=='pinned'&&!sel)document.getElementById('f-cat').value=S.activeCat}
function openAddModal(){S.editId=null;document.getElementById('m-ttl-txt').textContent='Add Tool';['f-url','f-name','f-desc','f-icon','f-tags'].forEach(id=>document.getElementById(id).value='');popCats();buildEP('tool','f-icon');openModal('tool-modal')}
function editT(id){const t=S.tools.find(x=>x.id===id);if(!t)return;S.editId=id;document.getElementById('m-ttl-txt').textContent='Edit Tool';document.getElementById('f-url').value=t.url;document.getElementById('f-name').value=t.name;document.getElementById('f-desc').value=t.desc||'';document.getElementById('f-icon').value=t.icon||'';document.getElementById('f-tags').value=(t.tags||[]).join(', ');popCats(t.cat);buildEP('tool','f-icon');openModal('tool-modal')}
function autoFill(){const u=document.getElementById('f-url').value.trim();if(!u||document.getElementById('f-name').value)return;try{const h=new URL(u).hostname.replace('www.','');const n=h.split('.')[0];document.getElementById('f-name').value=n.charAt(0).toUpperCase()+n.slice(1)}catch(e){}}
function saveTool(){
  const url=document.getElementById('f-url').value.trim(),name=document.getElementById('f-name').value.trim();
  const cat=document.getElementById('f-cat').value,desc=document.getElementById('f-desc').value.trim();
  const icon=document.getElementById('f-icon').value.trim(),tags=document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  if(!url||!name){showToast('URL and Name are required','err');return}
  if(S.editId){const t=S.tools.find(x=>x.id===S.editId);if(t)Object.assign(t,{url,name,cat,desc,icon,tags});showToast('Tool updated вң“','ok')}
  else{S.tools.push({id:gid('t'),url,name,cat,desc,icon,tags,pinned:false});showToast('Tool added вң“','ok')}
  save();closeModal('tool-modal');renderAll()
}

function renderCatList(){
  const el=document.getElementById('cats-list');
  if(!S.cats.length){el.innerHTML='<p style="color:var(--text2);font-size:12px;padding:.5rem 0">No categories yet.</p>';return}
  el.innerHTML=S.cats.map(c=>{
    const cnt=S.tools.filter(t=>t.cat===c.id).length;
    return`<div class="citem"><div class="cdot" style="background:${c.color}"></div><span style="font-size:14px">${c.icon}</span><span style="font-size:12px;flex:1">${c.name}</span><span style="font-size:10.5px;color:var(--text3);margin-right:10px">${cnt} tools</span><button class="a-btn del" onclick="delCat('${c.id}')">вң•</button></div>`;
  }).join('')
}
function delCat(id){
  const cnt=S.tools.filter(t=>t.cat===id).length;
  if(cnt>0&&!confirm(`Delete category and ${cnt} tool(s)?`))return;
  S.tools=S.tools.filter(t=>t.cat!==id);S.cats=S.cats.filter(c=>c.id!==id);
  if(S.activeCat===id)S.activeCat='all';
  save();renderCatList();renderAll();showToast('Category deleted','ok')
}

/* в”Җв”Җ IMPORT / EXPORT в”Җв”Җ */
function openIE(){document.getElementById('ie-body').innerHTML='';openModal('ie-modal')}
function showExport(){
  const d=JSON.stringify({tools:S.tools,cats:S.cats},null,2);
  document.getElementById('ie-body').innerHTML=`<p style="font-size:11.5px;color:var(--text2);margin-bottom:.5rem">Your full data backup вҖ” copy or download:</p><textarea class="imp-area" readonly onclick="this.select()">${d}</textarea><div style="margin-top:7px;display:flex;gap:6px"><button class="btn btn-sm" onclick="cpExport()">рҹ“Ӣ Copy</button><button class="btn btn-sm" onclick="dlExport()">в¬Ү Download</button></div>`
}
function cpExport(){const ta=document.querySelector('.imp-area');if(ta){navigator.clipboard.writeText(ta.value).then(()=>showToast('Copied вң“','ok')).catch(()=>{ta.select();document.execCommand('copy');showToast('Copied вң“','ok')})}}
function dlExport(){const d=JSON.stringify({tools:S.tools,cats:S.cats},null,2);const b=new Blob([d],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='chainhub-backup.json';a.click();showToast('Downloaded вң“','ok')}
function showImport(){document.getElementById('ie-body').innerHTML=`<p style="font-size:11.5px;color:var(--text2);margin-bottom:.5rem">Paste a JSON backup to import or merge:</p><textarea class="imp-area" id="imp-ta" placeholder='{"tools":[...],"cats":[...]}'></textarea><div style="margin-top:7px;display:flex;gap:6px"><button class="btn btn-p btn-sm" onclick="doImport()">рҹ“Ҙ Replace all</button><button class="btn btn-sm" onclick="doMerge()">рҹ”Җ Merge (skip dupes)</button></div>`}
function doImport(){try{const d=JSON.parse(document.getElementById('imp-ta').value);S.tools=d.tools||[];S.cats=d.cats||[];save();closeModal('ie-modal');renderAll();showToast(`Imported ${S.tools.length} tools вң“`,'ok')}catch(e){showToast('Invalid JSON','err')}}
function doMerge(){try{const d=JSON.parse(document.getElementById('imp-ta').value);let tc=0,cc=0;(d.cats||[]).forEach(c=>{if(!S.cats.find(x=>x.name===c.name)){S.cats.push({...c,id:c.id||gid('c')});cc++}});(d.tools||[]).forEach(t=>{if(!S.tools.find(x=>x.url===t.url&&x.name===t.name)){S.tools.push({...t,id:t.id||gid('t')});tc++}});save();closeModal('ie-modal');renderAll();showToast(`Merged: +${tc} tools, +${cc} cats вң“`,'ok')}catch(e){showToast('Invalid JSON','err')}}
function resetToDefault(){if(!confirm('Reset ALL data to your original v2 backup? This cannot be undone.'))return;S.tools=JSON.parse(JSON.stringify(SEED_DATA.tools));S.cats=JSON.parse(JSON.stringify(SEED_DATA.cats));S.view='grid';save();closeModal('ie-modal');renderAll();showToast('Reset to default data вң“','ok')}

/* в”Җв”Җ EMOJI PICKER в”Җв”Җ */
let epTab={};
function buildEP(ns,inputId){
  const tabs=Object.keys(W3E);epTab[ns]=tabs[0];
  document.getElementById(`${ns}-etabs`).innerHTML=tabs.map(t=>`<button class="ep-tab${t===tabs[0]?' active':''}" onclick="swEPTab('${ns}','${t.replace(/'/g,"\\'")}','${inputId}')">${t.split(' ')[0]}</button>`).join('');
  renderEPGrid(ns,tabs[0],inputId)
}
function swEPTab(ns,tab,inputId){epTab[ns]=tab;document.querySelectorAll(`#${ns}-etabs .ep-tab`).forEach((b,i)=>{b.className='ep-tab'+(Object.keys(W3E)[i]===tab?' active':'')});renderEPGrid(ns,tab,inputId)}
function renderEPGrid(ns,tab,inputId){document.getElementById(`${ns}-egrid`).innerHTML=(W3E[tab]||[]).map(e=>`<button class="ep-em" onclick="pickE('${inputId}','${e}','${ns}')">${e}</button>`).join('')}
function pickE(inputId,e,ns){document.getElementById(inputId).value=e;closeEP(ns)}
function toggleEP(ns){const p=document.getElementById(`${ns}-epanel`);const was=p.classList.contains('open');document.querySelectorAll('.epanel').forEach(x=>x.classList.remove('open'));if(!was)p.classList.add('open')}
function closeEP(ns){document.getElementById(`${ns}-epanel`).classList.remove('open')}
document.addEventListener('click',e=>{if(!e.target.closest('.emoji-wrap'))document.querySelectorAll('.epanel').forEach(p=>p.classList.remove('open'))})

/* в”Җв”Җ MODAL HELPERS в”Җв”Җ */
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open');document.querySelectorAll('.epanel').forEach(p=>p.classList.remove('open'))}
document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)closeModal(el.id)}))

/* в”Җв”Җ TOAST в”Җв”Җ */
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}

/* в”Җв”Җ KEYBOARD в”Җв”Җ */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(x=>x.classList.remove('open'));
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('srch').focus()}
  if((e.metaKey||e.ctrlKey)&&e.key==='n'){e.preventDefault();openAddModal()}
})

function renderAll(){renderSidebar();renderStats();renderTools()}

/* в”Җв”Җ INIT в”Җв”Җ */
load();renderAll();
</script>
